<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Amir Webstudio VPN</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#00c8ff;--orange:#f97316;--purple:#a855f7;--green:#22c55e;--bg:#020408}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
.bb{width:300px;height:300px;background:rgba(0,100,255,0.10);top:-100px;right:-80px}
.bo{width:250px;height:250px;background:rgba(255,130,0,0.08);top:200px;left:-100px}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 40px}
.header{text-align:center;padding:50px 0 24px}
.logo-wrap{position:relative;display:inline-block;margin-bottom:16px}
.ring1{position:absolute;inset:-10px;border-radius:50%;border:1px dashed rgba(0,200,255,0.25);animation:spin 12s linear infinite}
.ring2{position:absolute;inset:-20px;border-radius:50%;border:1px dashed rgba(255,165,0,0.12);animation:spin 20s linear infinite reverse}
.logo{width:90px;height:90px;border-radius:50%;object-fit:cover;display:block;filter:drop-shadow(0 0 20px rgba(0,200,255,0.4));animation:glow 3s ease-in-out infinite}
.app-name{font-size:20px;font-weight:900;letter-spacing:4px;color:#fff;text-transform:uppercase}
.app-sub{font-size:10px;letter-spacing:3px;color:rgba(0,200,255,0.5);margin-top:5px;text-transform:uppercase}
.main-btn{width:100%;background:linear-gradient(135deg,#0ea5e9,#0070aa,#003d6b);border:1px solid rgba(0,200,255,0.35);border-radius:20px;padding:22px 20px;color:#fff;cursor:pointer;text-align:center;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,200,255,0.25);animation:pulse 3s ease-in-out infinite;margin:24px 0;-webkit-tap-highlight-color:transparent;font-family:'Vazirmatn',sans-serif}
.main-btn:active{transform:scale(0.97)}
.main-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);transform:translateX(-100%);animation:shimmer 2.5s infinite}
.btn-icon{font-size:26px;margin-bottom:4px}
.btn-title{font-size:16px;font-weight:700}
.btn-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;letter-spacing:1px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
.stats{display:none;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 0;margin-bottom:16px}
.si{text-align:center}
.si+.si{border-right:1px solid rgba(255,255,255,0.07)}
.sn{font-size:20px;font-weight:700;color:var(--blue)}
.sl{font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;letter-spacing:1px}
.empty{text-align:center;padding:40px 0;opacity:.45}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.8}
.list{display:flex;flex-direction:column;gap:10px}
.card{background:rgba(255,255,255,0.035);border:1px solid rgba(0,200,255,0.12);border-radius:16px;padding:14px;animation:fadeUp .4s ease both}
.ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pb{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:6px;border:1px solid}
.cn{font-size:11px;color:rgba(255,255,255,0.15)}
.cfg{font-family:monospace;font-size:10px;color:rgba(255,255,255,0.45);word-break:break-all;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cpb{width:100%;background:rgba(0,200,255,0.06);border:1px solid rgba(0,200,255,0.22);border-radius:10px;padding:9px;color:var(--blue);font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.cpb.ok{background:var(--green);border-color:var(--green);color:#fff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#22c55e;color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(34,197,94,0.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer{margin-top:16px;border:1px solid rgba(255,165,0,0.2);border-radius:14px;overflow:hidden;text-decoration:none;display:block;background:rgba(255,140,0,0.05);-webkit-tap-highlight-color:transparent}
.fi{display:flex;align-items:center;gap:12px;padding:14px}
.ft{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:2px}
.fh{font-size:14px;font-weight:700;color:var(--orange)}
.fa{font-size:22px;color:rgba(255,255,255,0.2);margin-right:auto}
.err{background:rgba(255,50,50,0.08);border:1px solid rgba(255,50,50,0.2);border-radius:12px;padding:14px;margin-bottom:12px;font-size:12px;color:rgba(255,150,150,0.8);line-height:1.6;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 16px rgba(0,200,255,.35))}50%{filter:drop-shadow(0 0 28px rgba(0,200,255,.6))}}
@keyframes pulse{0%,100%{box-shadow:0 8px 32px rgba(0,200,255,.25)}50%{box-shadow:0 8px 40px rgba(0,200,255,.45)}}
@keyframes shimmer{100%{transform:translateX(100%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

      <div><div class="ft">کانال تلگرام رسمی</div><div class="fh">@amir_webstudio</div></div>
      <div class="fa">›</div>
    </div>
  </a>
</div>
<div class="toast" id="toast">✓ کانفیگ کپی شد!</div>

<script>
const TAG = '@amir_webstudio';

// چند proxy مختلف - اگه یکی کار نکرد بعدی امتحان میشه
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://cors.eu.org/${url}`,
];

const TARGET = 'https://t.me/s/FreeAutoConfig';

function rename(raw) {
  raw = raw.replace(/(vless:\/\/[^#\s<"]+)(#[^\s<"]*)?/g, '$1#' + TAG);
  raw = raw.replace(/(trojan:\/\/[^#\s<"]+)(#[^\s<"]*)?/g, '$1#' + TAG);
  raw = raw.replace(/(ss:\/\/[^#\s<"]+)(#[^\s<"]*)?/g, '$1#' + TAG);
  raw = raw.replace(/(vmess:\/\/)([A-Za-z0-9+\/=]+)/g, (m, p, b64) => {
    try { const o=JSON.parse(atob(b64)); o.ps=TAG; return p+btoa(JSON.stringify(o)); }
    catch { return m; }
  });
  return raw;
}

function proto(c) {
  if(c.startsWith('vmess')) return {l:'VMess',c:'#f97316'};
  if(c.startsWith('vless')) return {l:'VLess',c:'#a855f7'};
  if(c.startsWith('trojan')) return {l:'Trojan',c:'#00c8ff'};
  if(c.startsWith('ss')) return {l:'SS',c:'#22c55e'};
  return {l:'Config',c:'#888'};
}

function toast() {
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function copy(btn, cfg) {
  const txt = decodeURIComponent(cfg);
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  btn.classList.add('ok'); btn.textContent='✓  کپی شد!'; toast();
  setTimeout(()=>{ btn.classList.remove('ok'); btn.textContent='⎘  کپی کانفیگ'; },2000);
}

async function tryFetch(proxyFn) {
  const res = await fetch(proxyFn(TARGET), {signal: AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error('bad status');
  const html = await res.text();
  const pat = /(vmess|vless|trojan|ss):\/\/[^\s<"'\n]+/g;
  const matches = [...html.matchAll(pat)].map(m=>m[0]);
  return [...new Set(matches)];
}

async function fetchConfigs() {
  const btn=document.getElementById('btn');
  const errEl=document.getElementById('err');
  btn.innerHTML='<span class="spinner"></span><div class="btn-title" style="margin-top:8px">در حال دریافت...</div>';
  btn.style.animation='none'; btn.disabled=true;
  document.getElementById('empty').style.display='none';
  document.getElementById('list').innerHTML='';
  document.getElementById('stats').style.display='none';
  errEl.style.display='none';

  let configs = [];
  let lastErr = '';

  for(let i=0; i<PROXIES.length; i++) {
    try {
      configs = await tryFetch(PROXIES[i]);
      if(configs.length > 0) break;
    } catch(e) {
      lastErr = e.message;
    }
  }

  if(configs.length === 0) {
    errEl.innerHTML = '⚠️ اتصال به کانال ممکن نشد.<br>مطمئن شو VPN روشنه و دوباره امتحان کن.';
    errEl.style.display='block';
    document.getElementById('empty').style.display='block';
  } else {
    const final = configs.slice(0,50).map(rename);
    const vm=final.filter(c=>c.startsWith('vmess')).length;
    const vl=final.filter(c=>c.startsWith('vless')).length;
    document.getElementById('s0').textContent=final.length;
    document.getElementById('s1').textContent=vm;
    document.getElementById('s2').textContent=vl;
    document.getElementById('s3').textContent=final.length-vm-vl;
    document.getElementById('stats').style.display='grid';

    const list=document.getElementById('list');
    final.forEach((cfg,i)=>{
      const p=proto(cfg);
      const d=document.createElement('div');
      d.className='card';
      d.style.animationDelay=(i*0.03)+'s';
      const safe=encodeURIComponent(cfg);
      d.innerHTML=`
        <div class="ct">
          <span class="pb" style="color:${p.c};border-color:${p.c}">${p.l}</span>
          <span class="cn">#${i+1}</span>
        </div>
        <div class="cfg">${cfg}</div>
        <button class="cpb" onclick="copy(this,'${safe}')">⎘  کپی کانفیگ</button>`;
      list.appendChild(d);
    });
  }

  btn.innerHTML='<div class="btn-icon">⚡</div><div class="btn-title">دریافت کانفیگ اضطراری</div><div class="btn-sub">۵۰ کانفیگ از کانال رسمی</div>';
  btn.style.animation=''; btn.disabled=false;
}
</script>
</body>
</html>
